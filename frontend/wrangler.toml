name = "fitgen-frontend"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
# Defina suas variáveis de ambiente aqui. 
# Nota: Para segredos, use 'wrangler pages secret put'
NEXT_PUBLIC_API_URL = "https://api.suacozinha.site"

# Configuração para KV Namespaces (se necessário)
# [[kv_namespaces]]
# binding = "MY_KV"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Configuração para D1 Database (se necessário)
# [[d1_databases]]
# binding = "DB"
# database_name = "my-database"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
